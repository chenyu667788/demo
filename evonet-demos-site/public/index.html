    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        secondary: '#10B981',
                        neutral: '#6B7280',
                        'neutral-light': '#F3F4F6',

    </script>
    <style>
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.15);
        }
        .filter-btn {
            transition: all 0.2s ease;
            color: #0277DD;
        }
        .filter-btn.active {
            background-color: #0277DD;
            color: white;
            border-color: #0277DD;
        }
        .filter-btn:not(.active):hover {
            background-color: #0277DD;
            color: white;
        }
        .coming-soon-badge {
            background: #0277DD;
        }
        .gradient-linkpay {
            background: linear-gradient(135deg, #0277DD 0%, #025bb3 100%);
        }
        .gradient-dropin {
            background: linear-gradient(135deg, #0277DD 0%, #0260a8 100%);
        }
        .gradient-directapi {
            background: linear-gradient(135deg, #0277DD 0%, #025a9e 100%);
        }
        .gradient-doc {
            background: linear-gradient(135deg, #48E5CE 0%, #2dd4bf 100%);
        }
        .gradient-linkpay-sub {
            background: linear-gradient(135deg, #4ADAFC 0%, #38bdf8 100%);
        }
        .gradient-dropin-sub {
            background: linear-gradient(135deg, #4ADAFC 0%, #22d3ee 100%);
        }
        .gradient-directapi-sub {
            background: linear-gradient(135deg, #4ADAFC 0%, #67e8f9 100%);
        }
    </style>
</head>
<body class="bg-[#F2F9FF] font-sans min-h-screen">
    <div class="min-h-screen flex flex-col justify-between">
        <header class="bg-[#0277DD] text-white z-40">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 flex items-center">
                            <div class="flex items-center justify-center mr-2">
                                <span class="text-white font-bold text-2xl tracking-tight">Evonet</span>
                            </div>
                            <span class="text-xl font-bold text-white">Demos Site</span>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <a href="https://developer.evonetonline.com" target="_blank" class="text-sm font-medium text-white hover:text-white/80 mr-4">
                            <i class="fa fa-book mr-1"></i>ејҖеҸ‘иҖ…дёӯеҝ?                        </a>
                        <a href="https://evonetglobal.com/zh/" target="_blank" class="text-sm font-medium text-white hover:text-white/80">
                            <i class="fa fa-globe mr-1"></i>е®ҳзҪ‘
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-grow">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                <div class="text-center mb-10">
                    <div class="flex items-center justify-center mb-4">
                        <span class="text-[#0277DD] font-bold text-3xl tracking-tight mr-2">Evonet</span>
                        <span class="text-gray-900 font-bold text-2xl">Demos Site</span>
                    </div>
                    <h1 class="text-3xl font-bold text-gray-900 mb-3">дә§е“Ғжј”зӨәдёҺж–ҮжЎЈдёӯеҝ?/h1>
                    <p class="text-gray-700 max-w-2xl mx-auto">
                        дҪ“йӘҢ Evonet ж”Ҝд»ҳдә§е“Ғзҡ„е®Ңж•ҙеҠҹиғҪпјҢжҹҘзңӢйӣҶжҲҗж–ҮжЎЈеҝ«йҖҹжҺҘе…ҘгҖ?                    </p>
                </div>

                <div class="bg-[#F2F9FF] rounded-xl shadow-sm p-6 mb-8">
                    <div class="flex flex-col md:flex-row gap-6">
                        <div class="flex-1">
                            <label class="block text-sm font-medium text-[#0277DD] mb-3">
                                <i class="fa fa-filter mr-1"></i>зұ»еһӢзӯӣйҖ?                            </label>
                            <div class="flex flex-wrap gap-2" id="typeFilter">
                                <button class="filter-btn active px-4 py-2 rounded-lg text-sm font-medium border" data-type="all">
                                    <i class="fa fa-th-large mr-1"></i>All
                                </button>
                                <button class="filter-btn px-4 py-2 rounded-lg text-sm font-medium border" data-type="demo">
                                    <i class="fa fa-play-circle mr-1"></i>Demo
                                </button>
                                <button class="filter-btn px-4 py-2 rounded-lg text-sm font-medium border" data-type="doc">
                                    <i class="fa fa-file-text mr-1"></i>Doc
                                </button>
                            </div>
                        </div>
                        <div class="flex-1">
                            <label class="block text-sm font-medium text-[#0277DD] mb-3">
                                <i class="fa fa-cube mr-1"></i>дә§е“ҒзӯӣйҖ?                            </label>
                            <div class="flex flex-wrap gap-2" id="productFilter">
                                <button class="filter-btn active px-4 py-2 rounded-lg text-sm font-medium border" data-product="all">
                                    <i class="fa fa-cubes mr-1"></i>All
                                </button>
                                <button class="filter-btn px-4 py-2 rounded-lg text-sm font-medium border" data-product="linkpay">
                                    <i class="fa fa-link mr-1"></i>LinkPay
                                </button>
                                <button class="filter-btn px-4 py-2 rounded-lg text-sm font-medium border" data-product="dropin">
                                    <i class="fa fa-puzzle-piece mr-1"></i>Drop-in
                                </button>
                                <button class="filter-btn px-4 py-2 rounded-lg text-sm font-medium border" data-product="directapi">
                                    <i class="fa fa-code mr-1"></i>Direct API
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="cardsContainer">
                </div>

                <div id="emptyState" class="hidden text-center py-16">
                    <i class="fa fa-search text-[#0277DD] text-5xl mb-4 opacity-50"></i>
                    <p class="text-[#0277DD] text-lg">жІЎжңүжүҫеҲ°еҢ№й…Қзҡ„еҶ…е®?/p>
                </div>
            </div>
        </main>

        <footer class="bg-[#0277DD] text-white py-6">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex flex-col md:flex-row justify-between items-center">
                    <div class="mb-4 md:mb-0">
                        <p class="text-sm text-white/90">&copy; 2026 Evonet. дҝқз•ҷжүҖжңүжқғеҲ©гҖ?/p>
                    </div>
                    <div class="flex space-x-6">
                        <a href="#" class="text-sm text-white/90 hover:text-white">йҡҗз§Ғж”ҝзӯ–</a>
                        <a href="#" class="text-sm text-white/90 hover:text-white">жңҚеҠЎжқЎж¬ҫ</a>
                        <a href="#" class="text-sm text-white/90 hover:text-white">е…ідәҺжҲ‘д»¬</a>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const cardsData = [
            {
                id: 'linkpay-oneoff',
                type: 'demo',
                product: 'linkpay',
                title: 'LinkPay дёҖж¬ЎжҖ§ж”Ҝд»?,
                description: 'дҪ“йӘҢ LinkPay дёҖж¬ЎжҖ§ж”Ҝд»ҳе®Ңж•ҙжөҒзЁӢпјҢж”ҜжҢҒеӨҡз§Қж”Ҝд»ҳж–№ејҸгҖ?,
                icon: 'fa-credit-card',
                url: '/demos/linkpay-oneoff',
                badge: null,
                gradientClass: 'gradient-linkpay'
            },
            {
                id: 'linkpay-subscription',
                type: 'demo',
                product: 'linkpay',
                title: 'LinkPay и®ўйҳ…ж”Ҝд»ҳ',
                description: 'дҪ“йӘҢ LinkPay и®ўйҳ…ж”Ҝд»ҳеҠҹиғҪпјҢж”ҜжҢҒе‘ЁжңҹжҖ§иҮӘеҠЁжүЈж¬ҫгҖ?,
                icon: 'fa-bell',
                url: '/demos/linkpay-subscription',
                badge: null,
                gradientClass: 'gradient-linkpay-sub'
            },
            {
                id: 'linkpay-doc',
                type: 'doc',
                product: 'linkpay',
                title: 'LinkPay йӣҶжҲҗж–ҮжЎЈ',
                description: 'LinkPay дә§е“ҒйӣҶжҲҗжҢҮеҚ—пјҢеҢ…еҗ«е®Ңж•ҙзҡ„жҺҘе…ҘжӯҘйӘӨе’ҢзӨәдҫӢд»Јз ҒгҖ?,
                icon: 'fa-book',
                url: 'https://developer.evonetonline.com/docs/linkpay-integration-step',
                badge: null,
                gradientClass: 'gradient-doc'
            },
            {
                id: 'dropin-oneoff',
                type: 'demo',
                product: 'dropin',
                title: 'Drop-in дёҖж¬ЎжҖ§ж”Ҝд»?,
                description: 'дҪ“йӘҢ Drop-in з»„д»¶дёҖж¬ЎжҖ§ж”Ҝд»ҳпјҢеҝ«йҖҹйӣҶжҲҗж”Ҝд»ҳеҠҹиғҪгҖ?,
                icon: 'fa-credit-card',
                url: '/demos/dropin-oneoff',
                badge: null,
                gradientClass: 'gradient-dropin'
            },
            {
                id: 'dropin-subscription',
                type: 'demo',
                product: 'dropin',
                title: 'Drop-in и®ўйҳ…ж”Ҝд»ҳ',
                description: 'дҪ“йӘҢ Drop-in з»„д»¶и®ўйҳ…ж”Ҝд»ҳеҠҹиғҪпјҢдҫҝжҚ·з®ЎзҗҶе‘ЁжңҹжҖ§д»ҳж¬ҫгҖ?,
                icon: 'fa-bell',
                url: '/demos/dropin-subscription',
                badge: null,
                gradientClass: 'gradient-dropin-sub'
            },
            {
                id: 'dropin-doc',
                type: 'doc',
                product: 'dropin',
                title: 'Drop-in йӣҶжҲҗж–ҮжЎЈ',
                description: 'Drop-in з»„д»¶йӣҶжҲҗжҢҮеҚ—пјҢеҢ…еҗ«з»„д»¶й…ҚзҪ®е’Ңеӣһи°ғеӨ„зҗҶгҖ?,
                icon: 'fa-book',
                url: 'https://developer.evonetonline.com/docs/drop-in-integration',
                badge: null,
                gradientClass: 'gradient-doc'
            },
            {
                id: 'directapi-oneoff',
                type: 'demo',
                product: 'directapi',
                title: 'Direct API дёҖж¬ЎжҖ§ж”Ҝд»?,
                description: 'дҪ“йӘҢ Direct API дёҖж¬ЎжҖ§ж”Ҝд»ҳпјҢе®Ңе…ЁиҮӘе®ҡд№үж”Ҝд»ҳжөҒзЁӢгҖ?,
                icon: 'fa-credit-card',
                url: '/demos/directapi-oneoff',
                badge: null,
                gradientClass: 'gradient-directapi'
            },
            {
                id: 'directapi-subscription',
                type: 'demo',
                product: 'directapi',
                title: 'Direct API и®ўйҳ…ж”Ҝд»ҳ',
                description: 'дҪ“йӘҢ Direct API и®ўйҳ…ж”Ҝд»ҳеҠҹиғҪпјҢзҒөжҙ»жҺ§еҲ¶и®ўйҳ…йҖ»иҫ‘гҖ?,
                icon: 'fa-bell',
                url: '/demos/directapi-subscription',
                badge: null,
                gradientClass: 'gradient-directapi-sub'
            },
            {
                id: 'directapi-doc',
                type: 'doc',
                product: 'directapi',
                title: 'Direct API йӣҶжҲҗж–ҮжЎЈ',
                description: 'Direct API йӣҶжҲҗжҢҮеҚ—пјҢеҢ…еҗ?API жҺҘеҸЈиҜҰз»ҶиҜҙжҳҺгҖ?,
                icon: 'fa-book',
                url: 'https://developer.evonetonline.com/docs/direct-api-integration',
                badge: null,
                gradientClass: 'gradient-doc'
            }
        ];

        let currentTypeFilter = 'all';
        let currentProductFilter = 'all';

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            const emptyState = document.getElementById('emptyState');
            
            const filteredCards = cardsData.filter(card => {
                const typeMatch = currentTypeFilter === 'all' || card.type === currentTypeFilter;
                const productMatch = currentProductFilter === 'all' || card.product === currentProductFilter;
                return typeMatch && productMatch;
            });

            if (filteredCards.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            
            container.innerHTML = filteredCards.map(card => {
                return `
                <div class="card-hover bg-white rounded-xl shadow-sm overflow-hidden flex flex-col" data-type="${card.type}" data-product="${card.product}">
                    <div class="h-32 relative ${card.gradientClass}">
                        <div class="absolute inset-0 flex items-center justify-center">
                            <i class="fa ${card.icon} text-white text-4xl opacity-80"></i>
                        </div>
                        ${card.badge ? `
                            <span class="coming-soon-badge absolute top-3 right-3 px-3 py-1 rounded-full text-xs font-medium text-white">
                                ${card.badge}
                            </span>
                        ` : ''}
                        <span class="absolute top-3 left-3 px-3 py-1 rounded-full text-xs font-medium ${card.type === 'demo' ? 'bg-[#0277DD]' : 'bg-emerald-500'} text-white">
                            ${card.type === 'demo' ? 'Demo' : 'Doc'}
                        </span>
                    </div>
                    <div class="p-5 flex flex-col flex-grow">
                        <h3 class="text-lg font-semibold text-gray-900 mb-2">${card.title}</h3>
                        <p class="text-sm text-gray-600 mb-4 line-clamp-2 flex-grow">${card.description}</p>
                        <button 
                            onclick="handleCardClick('${card.id}')" 
                            class="w-full py-2.5 px-4 rounded-lg font-medium text-sm transition-colors duration-200 ${
                                card.badge 
                                    ? 'bg-gray-100 text-gray-400 cursor-not-allowed' 
                                    : card.type === 'demo' 
                                        ? 'bg-[#0277DD] hover:bg-[#025bb3] text-white' 
                                        : 'bg-emerald-500 hover:bg-emerald-600 text-white'
                            }"
                            ${card.badge ? 'disabled' : ''}
                        >
                            <i class="fa ${card.type === 'demo' ? 'fa-play' : 'fa-external-link'} mr-2"></i>
                            ${card.badge ? 'еҚіе°ҶжҺЁеҮә' : (card.type === 'demo' ? 'ејҖе§ӢдҪ“йӘ? : 'жҹҘзңӢж–ҮжЎЈ')}
                        </button>
                    </div>
                </div>
            `}).join('');
        }

        function handleCardClick(cardId) {
            const card = cardsData.find(c => c.id === cardId);
            if (!card || card.badge) return;

            if (card.type === 'doc') {
                window.open(card.url, '_blank');
            } else {
                window.location.href = card.url;
            }
        }

        document.getElementById('typeFilter').addEventListener('click', function(e) {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;

            document.querySelectorAll('#typeFilter .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTypeFilter = btn.dataset.type;
            renderCards();
        });

        document.getElementById('productFilter').addEventListener('click', function(e) {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;

            document.querySelectorAll('#productFilter .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentProductFilter = btn.dataset.product;
            renderCards();
        });

        renderCards();
    </script>
</body>
</html>
