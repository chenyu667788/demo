<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付失败 - Direct API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: 'rgb(2, 117, 221)', secondary: '#10B981', neutral: '#6B7280' } } }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans">
    <div class="min-h-screen flex flex-col">
        <header class="bg-[rgb(2,117,221)] border-b border-gray-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <a href="http://localhost:8080/" class="text-sm text-white hover:text-white/80 mr-6">Back to site</a>
                        <div class="flex-shrink-0 flex items-center">
                            <i class="fa fa-credit-card text-white text-2xl mr-2"></i>
                            <span class="text-xl font-bold text-white">Evonet Direct API</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-grow flex items-center justify-center">
            <div class="max-w-md mx-auto px-4 sm:px-6 lg:px-8 py-12">
                <div class="bg-white rounded-lg shadow p-8 text-center">
                    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-100 mb-6">
                        <i class="fa fa-times text-2xl text-red-600"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-900 mb-4">支付失败</h1>
                    <p class="text-neutral mb-6">很抱歉，您的支付未能成功处理，请稍后重试。</p>
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between items-center">
                            <span class="text-neutral">订单状态</span>
                            <span class="font-medium text-red-600">支付失败</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-neutral">处理时间</span>
                            <span class="font-medium" id="errorTime"></span>
                        </div>
                    </div>
                    <a href="/demos/directapi-oneoff" class="inline-block bg-primary hover:bg-primary/90 text-white font-medium py-2 px-6 rounded-md transition-colors duration-200">
                        <i class="fa fa-refresh mr-2"></i>重新支付
                    </a>
                </div>
            </div>
        </main>

        <footer class="bg-[rgb(2,117,221)] py-8">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <p class="text-sm text-white text-center">© 2026 Evonet Direct API Demo. 保留所有权利。</p>
            </div>
        </footer>
    </div>

    <script>
        document.getElementById('errorTime').textContent = new Date().toLocaleString('zh-CN');
    </script>
</body>
</html>
