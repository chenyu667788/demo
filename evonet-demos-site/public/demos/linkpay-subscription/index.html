    <script>
        let plans = [];
        let selectedPlanId = null;

        async function loadPlans() {
            try {
                const response = await fetch('/api/plans');
                const data = await response.json();
                if (data.success) {
                    plans = data.plans;
                    renderPlans();
                }
            } catch (error) {
                console.error('Failed to load plans:', error);
                document.getElementById('plansContainer').innerHTML = `
                    <div class="col-span-3 text-center py-12">
                        <i class="fa fa-exclamation-circle text-4xl text-red-500"></i>
                        <p class="mt-4 text-red-500">ÕŖĀĶĮĮÕż▒Ķ┤ź’╝īĶ»ĘÕłĘµ¢░ķĪĄķØóķćŹĶ»Ģ</p>
                    </div>
                `;
            }
        }

        function renderPlans() {
            const container = document.getElementById('plansContainer');
            container.innerHTML = plans.map(plan => `
                <div class="plan-card bg-white rounded-lg card-shadow p-8 relative cursor-pointer ${plan.popular ? 'border-2' : 'border border-gray-200'}"
                    style="${plan.popular ? 'border-color: rgb(74, 218, 252);' : ''}"
                    data-plan-id="${plan.id}">
                    ${plan.popular ? '<div class="absolute top-0 right-0 text-white text-xs font-bold px-3 py-1 rounded-bl-lg rounded-tr-lg" style="background-color: rgb(74, 218, 252);">µ£ĆÕÅŚµ¼óĶ┐?/div>' : ''}
                    <div class="text-center mb-6">

                    </div>
                    <div class="text-center mb-6">
                        <span class="text-4xl font-bold text-gray-900">$${plan.price}</span>
                        <span class="text-neutral">/${plan.billingCycle === 'monthly' ? 'µ£? : 'Õ╣?}</span>
                    </div>
                    <ul class="space-y-3 mb-8">
                        ${plan.features.map(feature => `
                            <li class="flex items-center text-sm text-gray-600">
                                <i class="fa fa-check-circle text-secondary mr-3"></i>
                                ${feature}
                            </li>
                        `).join('')}
                    </ul>
                    <button id="btn-${plan.id}" onclick="selectPlan('${plan.id}')" 
                        class="w-full py-3 rounded-lg font-medium transition-colors duration-200 bg-primary text-white hover:bg-primary/90">
                        ķĆēµŗ®µŁżµ¢╣µĪ?                    </button>
                </div>
            `).join('');
        }

        function selectPlan(planId) {
            const selectedPlan = plans.find(p => p.id === planId);
            if (!selectedPlan) return;
            
            selectedPlanId = planId;
            
            document.querySelectorAll('.plan-card button').forEach(btn => {
                btn.classList.remove('bg-gray-400', 'cursor-not-allowed', 'hover:bg-gray-400');
                btn.classList.add('bg-primary', 'hover:bg-primary/90');
                btn.disabled = false;
                btn.textContent = 'ķĆēµŗ®µŁżµ¢╣µĪ?;
            });
            
            const selectedBtn = document.getElementById(`btn-${planId}`);
            selectedBtn.classList.remove('bg-primary', 'hover:bg-primary/90');
            selectedBtn.classList.add('bg-gray-400', 'cursor-not-allowed', 'hover:bg-gray-400');
            selectedBtn.disabled = true;
            selectedBtn.innerHTML = '<i class="fa fa-check mr-2"></i>ÕĘ▓ķĆēµŗ®';
            
            document.querySelectorAll('.plan-card').forEach(card => {
                card.classList.remove('selected');

            document.querySelector(`[data-plan-id="${planId}"]`).classList.add('selected');
            
            setTimeout(() => {
                window.location.href = `checkout.html?planId=${planId}`;
