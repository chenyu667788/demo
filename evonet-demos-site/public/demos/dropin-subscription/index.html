<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>и®ўйҳ…ж–№жЎҲ - Drop-in Subscription Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'rgb(2, 117, 221)',
                        secondary: '#10B981',
                        neutral: '#6B7280',
                        'neutral-light': '#F3F4F6',
                        'popular-tag': 'rgb(74, 218, 252)',
                    },
                },
            }
        }
    </script>
    <style>
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .plan-card { transition: all 0.3s ease; }
        .plan-card:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <div class="min-h-screen flex flex-col">
        <header class="bg-[rgb(2,117,221)] border-b border-gray-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <a href="/" class="text-white text-sm font-medium hover:underline mr-6">Back to Site</a>
                        <div class="flex-shrink-0 flex items-center">
                            <i class="fa fa-credit-card text-white text-2xl mr-2"></i>
                            <span class="text-xl font-bold text-white">Drop-in Subscription</span>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <a href="https://evonetglobal.com/zh/contact-us/" target="_blank" class="text-sm font-medium text-white hover:underline">иҒ”зі»жҲ‘д»¬</a>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-grow">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
                <div class="text-center mb-12">
                    <h1 class="text-4xl font-bold text-gray-900 mb-4">йҖүжӢ©жӮЁзҡ„и®ўйҳ…ж–№жЎҲ</h1>
                    <p class="text-xl text-neutral">зҒөжҙ»зҡ„е®ҡд»·ж–№жЎҲпјҢж»Ўи¶ідёҚеҗҢйңҖжұ?/p>
                </div>

                <div id="plansContainer" class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                    <div class="text-center py-12">
                        <i class="fa fa-spinner fa-spin text-4xl text-primary"></i>
                        <p class="mt-4 text-neutral">еҠ иҪҪи®ўйҳ…ж–№жЎҲдё?..</p>
                    </div>
                </div>
            </div>
        </main>

        <footer class="bg-[rgb(2,117,221)] py-8">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex flex-col md:flex-row justify-between items-center">
                    <div class="mb-4 md:mb-0">
                        <p class="text-sm text-white">В© 2026 Drop-in Subscription Demo. дҝқз•ҷжүҖжңүжқғеҲ©гҖ?/p>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        let plans = [];

        async function loadPlans() {
            try {
                const response = await fetch('/api/plans');
                const data = await response.json();
                if (data.success) {
                    plans = data.plans;
                    renderPlans();
                }
            } catch (error) {
                console.error('Failed to load plans:', error);
                document.getElementById('plansContainer').innerHTML = 
                    '<div class="col-span-3 text-center py-12">' +
                        '<i class="fa fa-exclamation-circle text-4xl text-red-500"></i>' +
                        '<p class="mt-4 text-red-500">еҠ иҪҪеӨұиҙҘпјҢиҜ·еҲ·ж–°йЎөйқўйҮҚиҜ•</p>' +
                    '</div>';
            }
        }

        function renderPlans() {
            const container = document.getElementById('plansContainer');
            container.innerHTML = plans.map(function(plan) {
                return '<div class="plan-card bg-white rounded-lg card-shadow p-8 relative ' + (plan.popular ? 'border-2 border-[rgb(74,218,252)]' : 'border border-gray-200') + '">' +
                    (plan.popular ? '<div class="absolute top-0 right-0 bg-[rgb(74,218,252)] text-white text-xs font-bold px-3 py-1 rounded-bl-lg rounded-tr-lg">жңҖеҸ—ж¬ўиҝ?/div>' : '') +
                    '<div class="text-center mb-6">' +
                        '<h3 class="text-2xl font-bold text-gray-900 mb-2">' + plan.name + '</h3>' +
                        '<p class="text-sm text-neutral">' + plan.description + '</p>' +
                    '</div>' +
                    '<div class="text-center mb-6">' +
                        '<span class="text-4xl font-bold text-gray-900">$' + plan.price + '</span>' +
                        '<span class="text-neutral">/' + (plan.billingCycle === 'monthly' ? 'жң? : 'е№?) + '</span>' +
                    '</div>' +
                    '<ul class="space-y-3 mb-8">' +
                        plan.features.map(function(feature) {
                            return '<li class="flex items-center text-sm text-gray-600">' +
                                '<i class="fa fa-check-circle text-secondary mr-3"></i>' + feature +
                            '</li>';
                        }).join('') +
                    '</ul>' +
                    '<button onclick="selectPlan(\'' + plan.id + '\')" class="w-full py-3 rounded-lg font-medium transition-colors duration-200 bg-primary text-white hover:bg-primary/90">' +
                        'йҖүжӢ©жӯӨж–№жЎ? +
                    '</button>' +
                '</div>';
            }).join('');
        }

        function selectPlan(planId) {
            const plan = plans.find(function(p) { return p.id === planId; });
            if (!plan) return;
            
            const selectedPlan = {
                planId: plan.id,
                planName: plan.name,
                planPrice: plan.price,
                planDescription: plan.description,
                billingCycle: plan.billingCycle,
                planFeatures: plan.features,
                currency: plan.currency
            };
            
            sessionStorage.setItem('selectedPlan', JSON.stringify(selectedPlan));
            
            window.location.href = '/demos/dropin-subscription/checkout.html';
        }

        loadPlans();
    </script>
</body>
</html>
