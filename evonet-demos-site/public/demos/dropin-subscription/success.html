<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订阅成功 - Drop-in Subscription</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: 'rgb(2, 117, 221)', secondary: '#10B981', neutral: '#6B7280' } } }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans">
    <div class="min-h-screen flex flex-col">
        <header class="bg-[rgb(2,117,221)] border-b border-gray-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <a href="http://localhost:8080/" class="text-sm text-white hover:text-white/80 mr-6">Back to site</a>
                        <div class="flex-shrink-0 flex items-center">
                            <i class="fa fa-credit-card text-white text-2xl mr-2"></i>
                            <span class="text-xl font-bold text-white">Drop-in Subscription</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-grow flex items-center justify-center">
            <div class="max-w-md mx-auto px-4 sm:px-6 lg:px-8 py-12">
                <div class="bg-white rounded-lg shadow p-8 text-center">
                    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-100 mb-6">
                        <i class="fa fa-check text-2xl text-green-600"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-900 mb-4">订阅成功！</h1>
                    <p class="text-neutral mb-6">感谢您的订阅，您的订阅已成功激活。</p>
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between items-center">
                            <span class="text-neutral">订阅状态</span>
                            <span class="font-medium text-green-600">已激活</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-neutral">订阅时间</span>
                            <span class="font-medium" id="paymentTime"></span>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <a href="/demos/dropin-subscription/subscription-management.html" id="manageLink" class="block w-full bg-primary hover:bg-primary/90 text-white font-medium py-2 px-6 rounded-md transition-colors duration-200">
                            <i class="fa fa-cog mr-2"></i>管理我的订阅
                        </a>
                        <a href="/demos/dropin-subscription" class="block w-full bg-gray-100 hover:bg-gray-200 text-gray-900 font-medium py-2 px-6 rounded-md transition-colors duration-200">
                            <i class="fa fa-home mr-2"></i>返回首页
                        </a>
                    </div>
                </div>
            </div>
        </main>

        <footer class="bg-[rgb(2,117,221)] py-8">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <p class="text-sm text-white text-center">© 2026 Drop-in Subscription Demo. 保留所有权利。</p>
            </div>
        </footer>
    </div>

    <script>
        document.getElementById('paymentTime').textContent = new Date().toLocaleString('zh-CN');
        
        const urlParams = new URLSearchParams(window.location.search);
        const customerId = urlParams.get('customerId');
        if (customerId) {
            document.getElementById('manageLink').href = '/demos/dropin-subscription/subscription-management.html?customerId=' + customerId;
        }
    </script>
</body>
</html>
