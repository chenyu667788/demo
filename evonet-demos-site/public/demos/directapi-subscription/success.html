<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>иЃҐйШЕжИРеКЯ - Direct API Subscription</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: 'rgb(2, 117, 221)', secondary: '#10B981', neutral: '#6B7280' } } }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans">
    <div class="min-h-screen flex flex-col">
        <header class="bg-[rgb(2,117,221)] border-b border-gray-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <a href="/" class="text-white text-sm font-medium hover:underline mr-6">Back to Site</a>
                        <div class="flex-shrink-0 flex items-center">
                            <i class="fa fa-credit-card text-white text-2xl mr-2"></i>
                            <span class="text-xl font-bold text-white">Direct API Subscription</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-grow flex items-center justify-center">
            <div class="max-w-md mx-auto px-4 sm:px-6 lg:px-8 py-12">
                <div class="bg-white rounded-lg shadow p-8 text-center">
                    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-100 mb-6">
                        <i class="fa fa-check text-2xl text-green-600"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-900 mb-4">иЃҐйШЕжИРеКЯпЉ?/h1>
                    <p class="text-neutral mb-6">жДЯи∞ҐжВ®зЪДиЃҐйШЕпЉМжВ®зЪДиЃҐйШЕеЈ≤жИРеКЯжњАжіїгА?/p>
                    <div id="subscriptionDetails" class="bg-gray-50 rounded-lg p-6 mb-8 text-left">
                        <div class="animate-pulse space-y-4">
                            <div class="h-4 bg-gray-200 rounded w-3/4"></div>
                            <div class="h-4 bg-gray-200 rounded w-1/2"></div>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <a href="#" id="manageLink" class="block w-full bg-primary hover:bg-primary/90 text-white font-medium py-2 px-6 rounded-md transition-colors duration-200">
                            <i class="fa fa-cog mr-2"></i>зЃ°зРЖжИСзЪДиЃҐйШЕ
                        </a>
                        <a href="/demos/directapi-subscription" class="block w-full bg-gray-100 hover:bg-gray-200 text-gray-900 font-medium py-2 px-6 rounded-md transition-colors duration-200">
                            <i class="fa fa-home mr-2"></i>ињФеЫЮй¶Цй°µ
                        </a>
                    </div>
                </div>
            </div>
        </main>

        <footer class="bg-[rgb(2,117,221)] py-8">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <p class="text-sm text-white text-center">¬© 2026 Direct API Subscription Demo. дњЭзХЩжЙАжЬЙжЭГеИ©гА?/p>
            </div>
        </footer>
    </div>

    <script>
        function formatDate(isoString) {
            return new Date(isoString).toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        async function loadSubscriptionDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const subscriptionId = urlParams.get('subscriptionId');
            
            if (!subscriptionId) {
                document.getElementById('subscriptionDetails').innerHTML = '<p class="text-center text-neutral">иЃҐйШЕдњ°жБѓеК†иљљдЄ?..</p>';
                return;
            }
            
            try {
                const response = await fetch('/api/subscription/' + subscriptionId);
                const data = await response.json();
                
                if (data.success && data.subscription) {
                    const sub = data.subscription;
                    
                    document.getElementById('subscriptionDetails').innerHTML = 
                        '<div class="space-y-4">' +
                            '<div class="flex justify-between items-center py-3 border-b border-gray-200">' +
                                '<span class="text-neutral">иЃҐйШЕжЦєж°И</span>' +
                                '<span class="font-semibold text-gray-900">' + sub.plan.name + '</span>' +
                            '</div>' +
                            '<div class="flex justify-between items-center py-3 border-b border-gray-200">' +
                                '<span class="text-neutral">иЃҐйШЕзКґжА?/span>' +
                                '<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">еЈ≤жФѓдї?/span>' +
                            '</div>' +
                            '<div class="flex justify-between items-center py-3 border-b border-gray-200">' +
                                '<span class="text-neutral">иЃҐйШЕйЗСйҐЭ</span>' +
                                '<span class="font-bold text-primary">$' + sub.plan.price + '/жЬ?/span>' +
                            '</div>' +
                            '<div class="flex justify-between items-center py-3 border-b border-gray-200">' +
                                '<span class="text-neutral">иЃҐйШЕжЧґйЧі</span>' +
                                '<span class="font-medium text-gray-900">' + formatDate(sub.createdAt) + '</span>' +
                            '</div>' +
                            '<div class="flex justify-between items-center py-3">' +
                                '<span class="text-neutral">дЄЛжђ°жЙ£жђЊжЧ•жЬЯ</span>' +
                                '<span class="font-medium text-gray-900">' + formatDate(sub.nextBillingDate) + '</span>' +
                            '</div>' +
                        '</div>';
                    
                    if (sub.customerId) {
                        document.getElementById('manageLink').href = '/demos/directapi-subscription/subscription-management.html?customerId=' + sub.customerId;
                    }
                }
            } catch (error) {
                console.error('Failed to load subscription:', error);
                document.getElementById('subscriptionDetails').innerHTML = '<p class="text-center text-red-500">еК†иљљиЃҐйШЕдњ°жБѓе§±иі•</p>';
            }
        }

        loadSubscriptionDetails();
    </script>
</body>
</html>
