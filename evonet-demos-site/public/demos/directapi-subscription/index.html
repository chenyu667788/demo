    <script>
        let plans = [];

        async function loadPlans() {
            try {

                const data = await response.json();

                    renderPlans();

            } catch (error) {
                console.error('Failed to load plans:', error);
                document.getElementById('plansContainer').innerHTML = `
                    <div class="col-span-3 text-center py-12">
                        <i class="fa fa-exclamation-circle text-4xl text-red-500"></i>

                    </div>
                `;
            }
        }

        function renderPlans() {
            const container = document.getElementById('plansContainer');
            container.innerHTML = plans.map(plan => `
                <div class="plan-card bg-white rounded-lg card-shadow p-8 relative cursor-pointer ${plan.popular ? 'border-2 border-[rgb(74,218,252)]' : 'border border-gray-200'}" data-plan-id="${plan.id}">

                                ${feature}
                            </li>
                        `).join('')}
                    </ul>
                    <button id="btn-${plan.id}" onclick="selectPlan('${plan.id}')" class="w-full py-3 rounded-lg font-medium transition-colors duration-200 bg-primary text-white hover:bg-primary/90">
                        ÈÄâÊã©Ê≠§ÊñπÊ°?                    </button>
